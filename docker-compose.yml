services:
  mongo:
    image: mongo:6
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  server:
    build: ./server
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - MONGO_URI=mongodb://mongo:27017/task-manager
      - JWT_SECRET=replace-with-a-long-random-string
      - CLIENT_URL=http://localhost:5173
    depends_on:
      - mongo

  client:
    build: ./client
    ports:
      - "5173:80"
    depends_on:
      - server

volumes:
  mongo-data:
